<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="ابحث عن أي أغنية أو فنان على بطوط ميوزك">
<title>البحث — بطوط ميوزك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/design-system.css">
<link rel="stylesheet" href="../css/app.css">
<link rel="stylesheet" href="../css/nowplaying.css">
<style>
.search-hero { padding:32px 32px 0; }
.search-box { position:relative; max-width:640px; }
.search-box .material-symbols-outlined { position:absolute;right:18px;top:50%;transform:translateY(-50%);color:var(--outline);font-size:24px;pointer-events:none; }
.search-box input { width:100%;padding:16px 54px 16px 20px;background:rgba(255,255,255,0.7);border:1.5px solid var(--outline-variant);border-radius:50px;font-size:16px;color:var(--on-surface);outline:none;transition:all 0.3s ease;box-shadow:0 4px 16px rgba(79,70,229,0.08); }
.search-box input:focus { border-color:var(--primary-container);background:rgba(255,255,255,0.9);box-shadow:0 0 0 4px rgba(79,70,229,0.1); }
.search-box input::placeholder { color:var(--outline); }

.categories-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px; }
.category-card { border-radius:14px;padding:24px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;transition:all 0.3s ease;color:white;font-weight:700;font-size:14px;text-align:center;min-height:100px;justify-content:center;position:relative;overflow:hidden; }
.category-card:hover { transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.15); }
.category-card .material-symbols-outlined { font-size:32px;font-variation-settings:'FILL' 1; }
.category-card::before { content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;background:rgba(255,255,255,0.12);border-radius:50%; }

.results-section { padding:24px 32px; }
.results-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px; }
.track-results { display:flex;flex-direction:column;gap:4px; }

.recent-chip { display:inline-flex;align-items:center;gap:6px;padding:6px 12px 6px 8px;border-radius:50px;background:rgba(255,255,255,0.6);border:1px solid var(--outline-variant);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s ease; }
.recent-chip:hover { background:rgba(255,255,255,0.9); }
.recent-chip .material-symbols-outlined { font-size:16px;color:var(--outline); }

.no-results { text-align:center;padding:60px 20px;color:var(--outline); }
.no-results .material-symbols-outlined { font-size:64px;opacity:0.4;display:block;margin-bottom:16px;font-variation-settings:'FILL' 1; }
@media(max-width:480px){ .search-hero{padding:20px 16px 0} .categories-grid{grid-template-columns:repeat(2,1fr)} .results-section{padding:16px} }
</style>
</head>
<body class="liquid-bg">
<div class="ambient-blobs"></div>

<div class="app-shell">
  <div id="sidebar-slot"></div>
  <div class="main-content">
    <div class="topbar">
      <button class="topbar-nav-btn" onclick="history.back()">
        <span class="material-symbols-outlined" style="font-size:20px;font-variation-settings:'FILL' 1">arrow_back</span>
      </button>
      <span class="text-headline-sm" style="font-weight:700">البحث</span>
      <div class="topbar-actions">
        <div class="topbar-avatar">ب</div>
      </div>
    </div>

    <div class="search-hero">
      <div class="search-box">
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">search</span>
        <input type="text" id="search-input" placeholder="ابحث عن أغنية، فنان، أو ألبوم..." autofocus>
      </div>
    </div>

    <!-- Browse View -->
    <div id="browse-view">
      <div class="page-content" style="padding-bottom:12px">
        <div id="recent-searches-wrap" style="display:none">
          <div class="section-header" style="margin-bottom:14px">
            <h2>آخر عمليات البحث</h2>
            <button class="btn-ghost" style="padding:6px 12px;font-size:13px" onclick="clearRecentSearches()">مسح الكل</button>
          </div>
          <div id="recent-searches" style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:28px"></div>
        </div>
        <div class="section-header"><h2>تصفح حسب النوع</h2></div>
        <div class="categories-grid" id="categories-grid"></div>
      </div>
    </div>

    <!-- Results View -->
    <div id="results-view" style="display:none">
      <div class="results-section">
        <div id="results-status" style="margin-bottom:20px;color:var(--outline);font-size:14px"></div>
        <div style="display:flex;gap:10px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none">
          <button class="genre-chip active" data-tab="all" onclick="switchTab(this,'all')">الكل</button>
          <button class="genre-chip" data-tab="tracks" onclick="switchTab(this,'tracks')">أغاني</button>
          <button class="genre-chip" data-tab="artists" onclick="switchTab(this,'artists')">فنانين</button>
        </div>
        <div id="tab-all">
          <div class="section-header" style="margin-bottom:16px"><h2>أغاني</h2></div>
          <div class="track-results" id="results-tracks"></div>
        </div>
        <div id="tab-tracks" style="display:none">
          <div class="track-results" id="results-tracks-2"></div>
        </div>
        <div id="tab-artists" style="display:none">
          <div class="results-grid" id="results-artists"></div>
        </div>
      </div>
    </div>

    <div style="height:32px"></div>
  </div>
</div>

<div id="player-slot"></div>
<div id="mobile-nav-slot"></div>

<script src="../js/player.js"></script>
<script src="../js/layout.js"></script>
<script>
Layout.inject('search');

const CATEGORIES = [
  { label:'بوب',       tag:'pop music',      color:'linear-gradient(135deg,#e040fb,#8455ef)',  icon:'mic' },
  { label:'روك',       tag:'rock music',     color:'linear-gradient(135deg,#ff6b35,#e040fb)',  icon:'music_note' },
  { label:'إلكترونيك', tag:'electronic',     color:'linear-gradient(135deg,#4f46e5,#4cd7f6)',  icon:'graphic_eq' },
  { label:'جاز',       tag:'jazz music',     color:'linear-gradient(135deg,#00505f,#4cd7f6)',  icon:'piano' },
  { label:'كلاسيكي',   tag:'classical',      color:'linear-gradient(135deg,#8455ef,#4f46e5)',  icon:'library_music' },
  { label:'هيب هوب',   tag:'hip hop',        color:'linear-gradient(135deg,#131b2e,#6b38d4)',  icon:'headphones' },
  { label:'أكوستيك',   tag:'acoustic',       color:'linear-gradient(135deg,#1db954,#006a7c)',  icon:'queue_music' },
  { label:'R&B',       tag:'rnb',            color:'linear-gradient(135deg,#6b38d4,#e040fb)',  icon:'album' },
  { label:'شعبي',      tag:'folk',           color:'linear-gradient(135deg,#ff6b35,#ffca28)',  icon:'music_note' },
  { label:'عربي',      tag:'arabic music',   color:'linear-gradient(135deg,#4f46e5,#e040fb)',  icon:'language' },
];

function buildCategories() {
  const grid = document.getElementById('categories-grid');
  grid.innerHTML = CATEGORIES.map(c => `
    <div class="category-card" style="background:${c.color}" onclick="searchByTag('${c.tag}','${c.label}')">
      <span class="material-symbols-outlined">${c.icon}</span>
      <span>${c.label}</span>
    </div>
  `).join('');
}

async function searchByTag(tag, label) {
  document.getElementById('search-input').value = label;
  currentQuery = label;
  showResultsView(`تصفح: ${label}`);
  await performSearch(null, tag);
}

let searchTimer = null;
let currentQuery = '';
let currentTracks = [];
let currentArtistsMap = {};

const input = document.getElementById('search-input');
const urlQ = new URLSearchParams(location.search).get('q');
if (urlQ) { input.value = urlQ; setTimeout(() => doSearch(urlQ), 200); }

input.addEventListener('input', () => {
  clearTimeout(searchTimer);
  const q = input.value.trim();
  if (!q) { showBrowseView(); return; }
  searchTimer = setTimeout(() => doSearch(q), 450);
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter') { clearTimeout(searchTimer); doSearch(input.value.trim()); }
  if (e.key === 'Escape') { input.value = ''; showBrowseView(); }
});

function doSearch(q) {
  if (!q) { showBrowseView(); return; }
  currentQuery = q;
  showResultsView(`نتائج: "${q}"`);
  performSearch(q, null);
  saveRecentSearch(q);
}

async function performSearch(query, tag) {
  showLoading();
  try {
    let tracks;
    if (tag) tracks = await BatootApp.getYTByGenre(tag);
    else tracks = await BatootApp.searchYouTube(query);
    currentTracks = tracks;
    BatootApp.cacheTracks(tracks);
    currentArtistsMap = {};
    tracks.forEach(t => {
      if (!currentArtistsMap[t.artist]) currentArtistsMap[t.artist] = { name: t.artist, image: t.image, tracks: [] };
      currentArtistsMap[t.artist].tracks.push(t);
    });
    renderResults(tracks);
  } catch(e) {
    document.getElementById('results-tracks').innerHTML = `<div class="no-results"><span class="material-symbols-outlined">wifi_off</span><p>تعذر البحث. تحقق من الاتصال.</p></div>`;
  }
}

function showLoading() {
  const html = Array(6).fill(0).map(() => `
    <div class="track-row">
      <div class="skeleton" style="width:20px;height:14px;border-radius:4px"></div>
      <div class="skeleton" style="width:44px;height:44px;border-radius:8px;flex-shrink:0"></div>
      <div style="flex:1">
        <div class="skeleton" style="height:14px;margin-bottom:6px;border-radius:4px"></div>
        <div class="skeleton" style="height:12px;width:60%;border-radius:4px"></div>
      </div>
    </div>
  `).join('');
  document.getElementById('results-tracks').innerHTML = html;
  document.getElementById('results-tracks-2').innerHTML = html;
}

function renderResults(tracks) {
  const html = tracks.length
    ? BatootApp.renderTrackRows(tracks)
    : `<div class="no-results"><span class="material-symbols-outlined">search_off</span><p>لا توجد نتائج للبحث "${BatootApp.escHtml(currentQuery)}"</p></div>`;
  document.getElementById('results-tracks').innerHTML = html;
  document.getElementById('results-tracks-2').innerHTML = html;
  const artists = Object.values(currentArtistsMap).slice(0, 20);
  document.getElementById('results-artists').innerHTML = artists.map(a => `
    <div class="music-card" onclick="window.location.href='artist.html?name=${encodeURIComponent(a.name)}'">
      <div class="music-card__thumb" style="border-radius:50%">
        ${a.image ? `<img src="${a.image}" alt="${BatootApp.escHtml(a.name)}">` :
          `<div style="width:100%;height:100%;background:linear-gradient(135deg,var(--primary-fixed),var(--secondary-fixed));display:flex;align-items:center;justify-content:center">
            <span class="material-symbols-outlined" style="color:var(--primary-container);font-size:36px;font-variation-settings:'FILL' 1">person</span>
          </div>`}
      </div>
      <div class="music-card__title" style="text-align:center">${BatootApp.escHtml(a.name)}</div>
      <div class="music-card__sub" style="text-align:center">${a.tracks.length} أغنية</div>
    </div>
  `).join('');
  document.getElementById('results-status').textContent = tracks.length ? `${tracks.length} نتيجة` : '';
}

function switchTab(btn, tab) {
  document.querySelectorAll('[data-tab]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-all').style.display    = tab === 'all'     ? '' : 'none';
  document.getElementById('tab-tracks').style.display  = tab === 'tracks'  ? '' : 'none';
  document.getElementById('tab-artists').style.display = tab === 'artists' ? '' : 'none';
}

function showBrowseView() {
  document.getElementById('browse-view').style.display = '';
  document.getElementById('results-view').style.display = 'none';
  renderRecentSearches();
}
function showResultsView(status) {
  document.getElementById('browse-view').style.display = 'none';
  document.getElementById('results-view').style.display = '';
  document.getElementById('results-status').textContent = status || '';
}

function saveRecentSearch(q) {
  let s = JSON.parse(localStorage.getItem('batoot_searches') || '[]');
  s = [q, ...s.filter(x => x !== q)].slice(0, 10);
  localStorage.setItem('batoot_searches', JSON.stringify(s));
}
function renderRecentSearches() {
  const s = JSON.parse(localStorage.getItem('batoot_searches') || '[]');
  const wrap = document.getElementById('recent-searches-wrap');
  const container = document.getElementById('recent-searches');
  if (!s.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  container.innerHTML = s.map(q => `
    <button class="recent-chip" onclick="document.getElementById('search-input').value='${BatootApp.escHtml(q)}';doSearch('${BatootApp.escHtml(q)}')">
      <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">history</span>${q}
    </button>
  `).join('');
}
function clearRecentSearches() {
  localStorage.removeItem('batoot_searches');
  document.getElementById('recent-searches-wrap').style.display = 'none';
}

buildCategories();
renderRecentSearches();
</script>
</body>
</html>
