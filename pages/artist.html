<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="صفحة الفنان — بطوط ميوزك">
<title>الفنان — بطوط ميوزك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/design-system.css">
<link rel="stylesheet" href="../css/app.css">
<link rel="stylesheet" href="../css/nowplaying.css">
<style>
.artist-hero-section {
  position: relative; overflow: hidden;
  height: 280px; border-radius: 0 0 28px 28px;
  background: linear-gradient(135deg, var(--primary-container), var(--secondary-container), #e040fb);
}
.artist-hero-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
  filter: blur(3px) brightness(0.5) saturate(1.5);
  transform: scale(1.1);
}
.artist-hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(19,27,46,0.85) 0%, transparent 60%);
  display: flex; align-items: flex-end; padding: 28px 32px; gap: 20px;
}
.artist-avatar {
  width: 100px; height: 100px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.5);
  overflow: hidden; flex-shrink: 0;
  background: linear-gradient(135deg,var(--primary-container),var(--secondary-container));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.artist-avatar img { width:100%;height:100%;object-fit:cover; }
.artist-hero-info { color: white; }
.artist-hero-name { font-size: 32px; font-weight: 800; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
.artist-hero-sub { font-size: 14px; opacity: 0.75; margin-top: 4px; }

.albums-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 16px;
}
.tracks-list { display: flex; flex-direction: column; gap: 4px; }
</style>
</head>
<body class="liquid-bg">
<div class="ambient-blobs"></div>

<div class="app-shell">
  <div id="sidebar-slot"></div>
  <div class="main-content">
    <div class="topbar">
      <button class="topbar-nav-btn" onclick="history.back()">
        <span class="material-symbols-outlined" style="font-size:20px;font-variation-settings:'FILL' 1">arrow_back</span>
      </button>
      <span class="text-headline-sm" style="font-weight:700" id="topbar-artist-name">الفنان</span>
      <div class="topbar-actions">
        <div class="topbar-avatar">ب</div>
      </div>
    </div>

    <!-- Artist Hero -->
    <div class="artist-hero-section" id="artist-hero">
      <img id="artist-hero-bg" class="artist-hero-bg" src="" alt="">
      <div class="artist-hero-overlay">
        <div class="artist-avatar" id="artist-avatar">
          <span class="material-symbols-outlined" style="font-size:44px;color:white;font-variation-settings:'FILL' 1">person</span>
        </div>
        <div class="artist-hero-info">
          <div class="artist-hero-name" id="artist-hero-name">يتحمل...</div>
          <div class="artist-hero-sub" id="artist-hero-sub">فنان</div>
        </div>
      </div>
    </div>

    <div class="page-content">
      <!-- Play All -->
      <div style="display:flex;gap:12px;margin-bottom:28px;align-items:center">
        <button class="btn-primary" onclick="playAllTracks()" id="play-all-btn" style="display:none">
          <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">play_arrow</span>
          تشغيل الكل
        </button>
        <button class="btn-secondary" onclick="shuffleAll()" id="shuffle-all-btn" style="display:none">
          <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">shuffle</span>
          عشوائي
        </button>
      </div>

      <!-- Top Tracks -->
      <div class="section-header"><h2>🎵 أشهر الأغاني</h2></div>
      <div class="tracks-list" id="tracks-container">
        ${Array(6).fill(0).map(()=>`<div class="track-row"><div class="skeleton" style="width:24px;height:14px;border-radius:4px"></div><div class="skeleton" style="width:44px;height:44px;border-radius:8px;flex-shrink:0"></div><div style="flex:1"><div class="skeleton" style="height:14px;border-radius:4px;margin-bottom:6px"></div><div class="skeleton" style="height:12px;width:60%;border-radius:4px"></div></div></div>`).join('')}
      </div>

      <div style="height:32px"></div>

      <!-- Albums -->
      <div class="section-header"><h2>💿 الألبومات والبلايليست</h2></div>
      <div class="albums-grid" id="albums-container">
        ${Array(4).fill(0).map(()=>`<div><div class="skeleton" style="aspect-ratio:1;border-radius:12px"></div><div class="skeleton" style="height:14px;margin-top:10px;border-radius:6px"></div></div>`).join('')}
      </div>

      <div style="height:40px"></div>
    </div>
  </div>
</div>

<div id="player-slot"></div>
<div id="mobile-nav-slot"></div>

<script src="../js/player.js"></script>
<script src="../js/layout.js"></script>
<script>
Layout.inject('home');

const artistName = decodeURIComponent(new URLSearchParams(location.search).get('name') || 'Artist');
document.getElementById('topbar-artist-name').textContent = artistName;
document.getElementById('artist-hero-name').textContent = artistName;
document.title = artistName + ' — بطوط ميوزك';

let artistTracks = [];

async function initArtist() {
  try {
    const tracks = await BatootApp.getArtistTracks(artistName, 20);
    artistTracks = tracks;
    BatootApp.cacheTracks(tracks);

    if (tracks.length) {
      // Update hero with first track image
      const heroImg = document.getElementById('artist-hero-bg');
      const avatarEl = document.getElementById('artist-avatar');
      if (tracks[0].image) {
        heroImg.src = tracks[0].image;
        avatarEl.innerHTML = `<img src="${tracks[0].image}" alt="${artistName}">`;
      }
      document.getElementById('artist-hero-sub').textContent = `${tracks.length} أغنية على يوتيوب`;

      document.getElementById('play-all-btn').style.display = '';
      document.getElementById('shuffle-all-btn').style.display = '';

      document.getElementById('tracks-container').innerHTML = BatootApp.renderTrackRows(tracks);
    } else {
      document.getElementById('tracks-container').innerHTML =
        `<div style="text-align:center;padding:40px;color:var(--outline)">
          <span class="material-symbols-outlined" style="font-size:48px;display:block;margin-bottom:12px;font-variation-settings:'FILL' 1">search_off</span>
          لا توجد أغاني متاحة لهذا الفنان
        </div>`;
    }
  } catch(e) {
    document.getElementById('tracks-container').innerHTML =
      `<div style="color:var(--outline);padding:16px">⚠️ تعذر التحميل</div>`;
  }

  // Load albums (YT playlists by search)
  try {
    const albumData = await BatootApp.searchYouTube(artistName + ' album playlist', 8);
    const albums = albumData.filter(t => t.title.toLowerCase().includes('album') ||
                                         t.title.toLowerCase().includes('playlist') ||
                                         t.title.toLowerCase().includes('official'));
    const showAlbums = albums.length ? albums : albumData.slice(0, 6);

    document.getElementById('albums-container').innerHTML = showAlbums.map(t => `
      <div class="album-card" onclick="BatootApp.play('${t.id}')">
        <div class="album-card__thumb">
          ${t.image ? `<img src="${t.image}" alt="${BatootApp.escHtml(t.title)}" loading="lazy">` :
            `<span class="material-symbols-outlined" style="font-size:36px;color:var(--primary-container);font-variation-settings:'FILL' 1">album</span>`}
        </div>
        <div class="album-card__title">${BatootApp.escHtml(t.title)}</div>
        <div class="album-card__sub">${BatootApp.escHtml(t.artist)}</div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('albums-container').innerHTML =
      `<div style="color:var(--outline);padding:16px;grid-column:1/-1">⚠️ تعذر تحميل الألبومات</div>`;
  }
}

function playAllTracks() {
  if (!artistTracks.length) return;
  BatootApp.cacheTracks(artistTracks);
  BatootApp.playWithQueue(artistTracks[0].id, artistTracks);
}

function shuffleAll() {
  if (!artistTracks.length) return;
  const shuffled = [...artistTracks].sort(() => Math.random() - 0.5);
  BatootApp.cacheTracks(shuffled);
  BatootApp.playWithQueue(shuffled[0].id, shuffled);
}

initArtist();
</script>
</body>
</html>
